name: ClaudeWatch
options:
  bundleIdPrefix: com.claudewatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  # iOS Companion App
  ClaudeWatch iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOS
        type: group
      - path: Sources/Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/iOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.ios
        PRODUCT_NAME: ClaudeWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts: []

  # watchOS App
  ClaudeWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/watchOS
        type: group
      - path: Sources/Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/watchOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.watchkitapp
        PRODUCT_NAME: ClaudeWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        EMBEDDED_CONTENT_CONTAINS_SWIFT: "YES"
    dependencies:
      - target: ClaudeWatch Watch Extension
    preBuildScripts: []

  # watchOS Extension (required for watchOS app)
  ClaudeWatch Watch Extension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/watchOS
        type: group
      - path: Sources/Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/watchOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.watchkitapp.watchkitextension
        PRODUCT_NAME: ClaudeWatch Extension
    dependencies: []
