name: ClaudeWatch
options:
  bundleIdPrefix: com.rcyn111.claudewatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    DEVELOPMENT_TEAM: WCTCYM7AW6
    CODE_SIGN_STYLE: Automatic

schemes:
  ClaudeWatch iOS:
    build:
      targets:
        ClaudeWatch iOS: all
        ClaudeWatch Watch App: all
    run:
      config: Debug

  ClaudeWatch Watch App:
    build:
      targets:
        ClaudeWatch Watch App: all
    run:
      config: Debug

targets:
  # iOS Companion App
  ClaudeWatch iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/iOS
        type: group
      - path: Sources/Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/iOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rcyn111.claudewatch.ios
        PRODUCT_NAME: ClaudeWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_EMBED_WATCH_APPS: "YES"
    dependencies:
      - target: ClaudeWatch Watch App
        embed: true
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
    postCompileScripts: []

  # watchOS App (single-target model — Xcode 27 removed WatchKit extensions)
  ClaudeWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/watchOS
        type: group
      - path: Sources/Shared
        type: group
    settings:
      base:
        INFOPLIST_FILE: Sources/watchOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rcyn111.claudewatch.watchkitapp
        PRODUCT_NAME: ClaudeWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
